<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Lou Yang Counselling</title>
    <meta name="description" content="Get in touch or join the waiting list. Lou Yang Counselling, Berlin.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>L</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #0a0a0a;
            --black-light: #141414;
            --white: #FFFFFF;
            --white-soft: rgba(255,255,255,0.78);
            --white-muted: rgba(255,255,255,0.5);
            --font-heading: 'DM Sans', -apple-system, sans-serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            color: var(--white);
            background: var(--black);
            line-height: 1.7;
            font-weight: 400;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        a:focus-visible, button:focus-visible {
            outline: 2px solid rgba(255,255,255,0.6);
            outline-offset: 3px;
        }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z|-index: 100;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--white);
            text-decoration: none;
            letter-spacing: 0.03em;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 1.5rem;
            white-space: nowrap;
        }

        .nav-back {
            color: var(--white);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: opacity 0.3s;
        }

        .nav-back:hover { opacity: 0.6; }

        /* ===== MAIN CONTENT ===== */
        .contact-main {
            max-width: 580px;
            margin: 0 auto;
            padding: 10rem 2rem 6rem;
            text-align: center;
        }

        .contact-main h1 {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        .contact-main > p {
            font-size: 1.05rem;
            color: var(--white-soft);
            line-height: 1.85;
            margin-bottom: 2.5rem;
        }

        .btn-primary {
            display: inline-block;
            padding: 1rem 2.4rem;
            background: var(--white);
            color: var(--black);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-primary:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }

        /* ===== DIVIDER ===== */
        .divider {
            width: 60px;
            height: 1px;
            background: rgba(255,255,255,0.15);
            margin: 3.5rem auto;
        }

        /* ===== EMAIL SECTION ===== */
        .email-section {
            text-align: center;
        }

        .email-section h2 {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 1rem;
        }

        .email-section  {
            font-size: 0.95rem;
            color: var(--white-soft);
            line-height: 1.8;
            margin-bottom: 1.2rem;
        }

        .email-link {
            color: var(--white);
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 2px;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .email-link:hover { border-color: var(--white); }

        /* ===== FOOTER ===== */
        footer {
            background: var(--white);
            color: #666;
            padding: 2.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        footer a {
            color: #444;
            text-decoration: none;
        }

        footer a:hover { color: var(--black); }

        .footer-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            nav { padding: 1.2rem 1.5rem; }

            .nav-logo {
                position: relative;
                left: auto;
                transform: none;
                top: auto;
                font-size: 1.2rem;
            }

            .contact-main { padding: 8rem 1.5rem 4rem; }

            footer {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .footer-right {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        /* ===== FADE-IN ===== */
        .fade-in {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-back">&larr; Back</a>
        <a href="index.html" class="nav-logo">Lou Yang Counselling</a>
        <span></span>
    </nav>

    <div class="contact-main fade-in">
        <h1>Get in touch.</h1>
        <p>I'vm currently building my practice and spots are limited. If you're interested in working together, join the waiting list and I'll reach out when a spot opens up.</p>

        <a href="https://forms.gle/WHV9pGXDGqV1tUZS6" class="btn-primary" target="_blank" rel="noopener">Join the Waiting List</a>
    </div>

    <footer>
        <span>&copy; 2026 Fang Yang</span>
        <div class="footer-right">
            <a href="index.html">Home</a>
            <span>Berlin, Germany</span>
        </div>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.12 });
        document.querySelectorAll('.fade-in').forEach(el => {
            observer.observe(el);
            if (el.getBoundingClientRect().top < window.innerHeight) {
                el.classList.add('visible');
            }
        });
    </script>

</body>
</html>
